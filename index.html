<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Radio">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152.png">
  <title>Radio SVPL</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/radio.js" defer></script>
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1" defer></script>
</head>
<body>
  <main class="radio-app">
    <div class="radio-header">
      <div>
        <h1>Radio</h1>
        <p>Polskie, szwedzkie i inne stacje</p>
      </div>
    </div>

    <section class="radio-player card">
      <div class="radio-now">
        <div class="radio-art" id="radioArtwork" aria-hidden="true">
          <span class="radio-art-fallback">📻</span>
        </div>
        <div>
          <p class="radio-label">Teraz gra</p>
          <h2 id="radioCurrentName">Wybierz stację</h2>
          <p id="radioCurrentMeta">Dotknij stacji albo użyj szybkich przycisków.</p>
        </div>
        <div class="radio-controls">
          <button id="radioPlayPause" onclick="radioTogglePlay()" aria-label="Odtwórz albo pauza" title="Odtwórz / pauza">▶</button>
          <button onclick="radioStop()" aria-label="Stop" title="Stop">■</button>
          <button onclick="radioCast()" aria-label="Cast" title="Cast">Cast</button>
          <button onclick="radioLoadStations(false, true)" aria-label="Odśwież" title="Odśwież">↻</button>
        </div>
      </div>
    </section>

    <div class="radio-volume">
      <span>Głośność</span>
      <input id="radioVolume" type="range" min="0" max="100" value="80" oninput="radioSetVolume(this.value)">
      <b id="radioVolumeLabel">80%</b>
    </div>

    <input id="radioSearch" class="radio-search" type="search" placeholder="Szukaj: RMF, P1, jazz" oninput="radioSearchChanged(this.value)">

    <div class="radio-segments">
      <button id="radioCountryPL" class="active" onclick="radioSetCountry('PL')">Polska</button>
      <button id="radioCountrySE" onclick="radioSetCountry('SE')">Szwecja</button>
      <button id="radioCountryOther" onclick="radioSetCountry('')">Inne</button>
    </div>

    <div class="radio-scroll-area">
      <div class="radio-quick">
        <button onclick="radioQuick('RMF FM','PL')">RMF FM</button>
        <button onclick="radioQuick('Radio ZET','PL')">Radio ZET</button>
        <button onclick="radioQuick('TOK FM','PL')">TOK FM</button>
        <button onclick="radioQuick('Polskie Radio Jedynka','PL')">Jedynka</button>
        <button onclick="radioQuick('Sveriges Radio P1','SE')">SR P1</button>
        <button onclick="radioQuick('Sveriges Radio P3','SE')">SR P3</button>
      </div>

      <p class="radio-group-title">Gdańsk / Trójmiasto</p>
      <div class="radio-quick">
        <button onclick="radioQuick('Radio Gdańsk','PL')">Radio Gdańsk</button>
        <button onclick="radioQuick('Eska Trójmiasto','PL')">Eska 3City</button>
        <button onclick="radioQuick('Radio Plus Gdańsk','PL')">Plus Gdańsk</button>
        <button onclick="radioQuick('Złote Przeboje Gdańsk','PL')">Złote Gdańsk</button>
        <button onclick="radioQuick('RMF Maxx Trójmiasto','PL')">RMF 3City</button>
        <button onclick="radioQuick('Radio Pogoda Gdańsk','PL')">Pogoda Gdańsk</button>
      </div>

      <p class="radio-group-title">Szwecja</p>
      <div class="radio-quick">
        <button onclick="radioQuick('Sveriges Radio P4 Gotland','SE')">P4 Gotland</button>
        <button onclick="radioQuick('Sveriges Radio P4 Stockholm','SE')">P4 Stockholm</button>
        <button onclick="radioQuick('NRJ Sweden','SE')">NRJ Sweden</button>
        <button onclick="radioQuick('NRJ Stockholm','SE')">NRJ Stockholm</button>
      </div>

      <p class="radio-group-title">Klasyczne</p>
      <div class="radio-quick">
        <button onclick="radioQuick('RMF Classic','PL')">RMF Classic</button>
        <button onclick="radioQuick('Radio Chopin','PL')">Radio Chopin</button>
        <button onclick="radioQuick('Dwójka','PL')">Dwójka</button>
        <button onclick="radioQuick('P2 Klassiskt','SE')">P2 Klassiskt</button>
        <button onclick="radioQuick('Sveriges Radio P2','SE')">SR P2</button>
      </div>

      <p id="radioStatus" class="radio-status">Ładowanie stacji...</p>
      <div id="radioStations" class="radio-grid"></div>
    </div>
    <audio id="radioAudio" preload="none" playsinline></audio>
  </main>

</body>
</html>
